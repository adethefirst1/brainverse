[#] Netlify build configuration for Flutter web (BrainVerse puzzle_games)
[#] Docs: https://docs.netlify.com/build/configure-builds/overview/

[build]
  # Install Flutter (if not already cached), then build the web app.
  # Based on community guidance for Flutter + Netlify:
  # https://dev.to/mubeenmurj/flutter-web-deployment-on-netlify-manual-automated-continuous-2cbl
  command = "if [ -d \"flutter\" ]; then cd flutter && git pull && cd ..; else git clone https://github.com/flutter/flutter.git; fi; flutter/bin/flutter build web"
  publish = "build/web"

